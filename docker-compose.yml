services:
  legal_processor_worker:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: legal_processor_worker
    env_file:
      - .env  # This injects your local environment variables into the container
    volumes:
      # Maps your local host directories directly into the container's active working directory
      - ./data:/app/data
      - ./fml-raw-legal-store:/app/fml-raw-legal-store
    command: ["python3", "services/processor/src/worker.py"]
    restart: on-failure

  # this image will run the API server,
  # which will be responsible for handling incoming request
  # and serving responses based on the processed legal data.
  # It will also have access to the same shared volumes to read from the database
  # and serve all the necessary information.
  legal_api_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal_api_server
    ports:
      - "8000:8000"  # Exposes the port to your host machine
    env_file:
      - .env  # Injects your local environment variables into the container
    volumes:
      - ./fml-raw-legal-store:/app/fml-raw-legal-store  # Shared access to the database
      - ./data:/app/data                                # <-- FIXED: Explicitly mapped data folder for vector store access
      - ./services/api-rag/src:/app/services/api-rag/src
    command: ["python3", "services/api-rag/src/main.py"]  # <-- OVERRIDES the default worker command!
    restart: always

  # this service will run your automated scraping pipeline,
  # pulling targeted legal updates or raw regulations.
  # By containerizing it, we bypass host Python 3.14 version mismatches,
  # keeping Crawl4AI/Playwright execution locked securely into Python 3.11.
  legal_scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal_scraper
    env_file:
      - .env  # Injects your local environment variables into the container
    volumes:
      # --- FIXED: Aligned mount point pathing to match root structure ---
      - ./data:/app/data
    command: ["python3", "services/scraper/src/main.py"]  # Overrides default worker command to execute scraper