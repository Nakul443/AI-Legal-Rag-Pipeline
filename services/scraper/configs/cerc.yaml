# map for the engine
# This file defines the configuration for scraping the CERC website.
# It includes the base URL, starting URL, and the CSS selectors needed to extract the relevant information from the page.
# Instead of coding "Look for a table," you just tell the engine where the table is.

site_name: "CERC"
jurisdiction: "Central"
category: "Orders"
base_url: "https://cercind.gov.in"
start_url: "https://cercind.gov.in/recent_orders.html"
wait_for: "table" # Ensure the table renders before scraping

selectors:
  # Picking tr within tbody to skip header rows
  row: "table.table tbody tr" 
  # Title is usually the full text of the third column
  title: "td:nth-child(3)" 
  # The link is now often in the 4th column or wrapped in the title
  link: "td:nth-child(3) a, td:nth-child(4) a" 
  date: "td:nth-child(2)"